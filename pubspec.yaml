name: tsai_ui
description: Enterprise Flutter UI components backed by the Tsai design system.
version: 0.1.4
homepage: https://tsaitechnology.github.io/tsai-ui-flutter/
documentation: https://tsaitechnology.github.io/tsai-ui-flutter/
repository: https://github.com/tsaitechnology/tsai-ui-flutter
issue_tracker: https://github.com/tsaitechnology/tsai-ui-flutter/issues
topics:
  - components
  - design-system
  - flutter
  - ui
  - widgets

environment:
  sdk: ^3.12.2
  flutter: ">=3.44.0"

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_lucide: ^1.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  yaml: ^3.1.3

flutter:
  uses-material-design: true
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf
    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono.ttf
